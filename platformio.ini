[platformio]
default_envs = m5stack_dial_demo

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:tools/git_sha.py
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D CORE_DEBUG_LEVEL=3
lib_deps =
  m5stack/M5Dial
  m5stack/M5Unified
  m5stack/M5GFX
  paulstoffregen/OneWire
  milesburton/DallasTemperature
  knolleary/PubSubClient@^2.8
  h2zero/NimBLE-Arduino

[env:m5stack_dial]
board = m5stack-stamps3
build_flags =
  ${env.build_flags}
  -D FERM_ENABLE_NETWORK=0
  -D FERM_ENABLE_OTA=0
  -D FERM_DEMO_SENSOR=0

[env:m5stack_dial_demo]
board = m5stack-stamps3
extra_scripts =
  pre:tools/git_sha.py
  upload:tools/ota_upload_target.py
build_flags =
  ${env.build_flags}
  -D FERM_ENABLE_NETWORK=1
  -D FERM_ENABLE_OTA=1
  -D FERM_DEMO_SENSOR=1
  -D FERM_ENABLE_HYDROMETER_BLE=1
; HTTP OTA when upload_port is a hostname/IP; USB esptool when unset or /dev/...
;   uv run platformio run -e m5stack_dial_demo -t upload --upload-port 192.168.x.x
; Or use the convenience env: m5stack_dial_demo_ota (set upload_port below or use --upload-port)
; Optional admin password: FERM_OTA_PASSWORD=secret uv run platformio run ...

[env:m5stack_dial_demo_ota]
extends = env:m5stack_dial_demo
; upload_port = 192.168.x.x   ; your device's IP (or pass --upload-port on CLI)

[env:m5stack_dial_wifi]
board = m5stack-stamps3
extra_scripts =
  pre:tools/git_sha.py
  upload:tools/ota_upload_target.py
build_flags =
  ${env.build_flags}
  -D FERM_ENABLE_NETWORK=1
  -D FERM_ENABLE_OTA=1
  -D FERM_DEMO_SENSOR=0
  -D FERM_ENABLE_HYDROMETER_BLE=1

[env:m5stack_dial_wifi_ota]
extends = env:m5stack_dial_wifi
; upload_port = 192.168.x.x   ; your device's IP (or pass --upload-port on CLI)

[env:native]
platform = native
framework =
extra_scripts =
test_framework = unity
lib_deps =
build_flags =
  -std=gnu++17
  -I include
  -I test/mocks
  -I src
  -D FERM_ENABLE_NETWORK=0
  -D FERM_DEMO_SENSOR=0
build_src_filter = -<*> +<control.cpp>
test_build_src = yes

[env:native_demo]
extends = env:native
build_flags =
  ${env:native.build_flags}
  -D FERM_DEMO_SENSOR=1
