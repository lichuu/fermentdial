name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build, publish release, deploy OTA site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp32-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-esp32-${{ runner.os }}-

      - name: Build firmware with release version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          export PLATFORMIO_BUILD_FLAGS="-D FERM_FIRMWARE_VERSION=\\\"${VERSION}\\\""
          uv run --frozen platformio run \
            -e m5stack_dial -e m5stack_dial_demo -e m5stack_dial_wifi

      - name: Assemble release assets and OTA site
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p out site/ota
          cp .pio/build/m5stack_dial_demo/firmware.bin out/fermentdial-demo.bin
          cp .pio/build/m5stack_dial_wifi/firmware.bin out/fermentdial-wifi.bin
          cp .pio/build/m5stack_dial/firmware.bin out/fermentdial-offline.bin
          cp out/fermentdial-demo.bin out/fermentdial-wifi.bin site/ota/
          cp site-src/index.html site/
          python3 - "$VERSION" "$REPO" <<'EOF'
          import hashlib, json, os, sys
          version, repo = sys.argv[1], sys.argv[2]
          builds = {}
          for variant in ("demo", "wifi"):
              path = f"site/ota/fermentdial-{variant}.bin"
              with open(path, "rb") as f:
                  data = f.read()
              builds[variant] = {
                  "file": f"fermentdial-{variant}.bin",
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              }
          manifest = {
              "version": version,
              "notes_url": f"https://github.com/{repo}/releases/tag/v{version}",
              "builds": builds,
          }
          with open("site/ota/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" out/*.bin --generate-notes --verify-tag

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
